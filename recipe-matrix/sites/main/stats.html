<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计中心 - 智能菜谱矩阵</title>
  <meta name="description" content="智能菜谱网站矩阵数据统计中心，实时查看全站浏览量、菜单生成次数、热门菜品排行等数据">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 仪表盘专用样式 */
    .stats-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .stats-hero {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 32px;
      text-align: center;
    }
    
    .stats-hero h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    
    .stats-hero p {
      opacity: 0.9;
      font-size: 1rem;
    }
    
    .stats-time {
      margin-top: 16px;
      font-size: 0.875rem;
      opacity: 0.8;
    }
    
    /* 统计卡片网格 */
    .stats-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .overview-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .overview-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    
    .overview-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    
    .overview-value {
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }
    
    .overview-label {
      font-size: 0.9rem;
      color: #666;
    }
    
    .overview-change {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #27ae60;
    }
    
    .overview-change.down {
      color: #e74c3c;
    }
    
    /* 排行榜区域 */
    .rankings-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    
    @media (max-width: 768px) {
      .rankings-section {
        grid-template-columns: 1fr;
      }
    }
    
    .ranking-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .ranking-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    
    .ranking-header h2 {
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ranking-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.3s;
    }
    
    .ranking-item:hover {
      background: #f8f9fa;
    }
    
    .ranking-item.current {
      background: #f0f4ff;
    }
    
    .rank-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    
    .rank-badge.gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: #fff; }
    .rank-badge.silver { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #fff; }
    .rank-badge.bronze { background: linear-gradient(135deg, #CD7F32, #B87333); color: #fff; }
    .rank-badge.normal { background: #f0f0f0; color: #666; }
    
    .rank-info {
      flex: 1;
      min-width: 0;
    }
    
    .rank-name {
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .rank-meta {
      font-size: 0.8rem;
      color: #999;
    }
    
    .rank-value {
      font-weight: 700;
      color: #667eea;
      font-size: 0.95rem;
    }
    
    /* 站点对比区 */
    .sites-comparison {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }
    
    .sites-comparison h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }
    
    .site-stat-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: transform 0.3s;
    }
    
    .site-stat-card:hover {
      transform: scale(1.02);
    }
    
    .site-stat-card.current {
      background: linear-gradient(135deg, #667eea15, #764ba215);
      border: 2px solid #667eea;
    }
    
    .site-emoji {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .site-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 4px;
    }
    
    .site-views {
      font-size: 1.25rem;
      font-weight: 700;
      color: #667eea;
    }
    
    .site-label {
      font-size: 0.75rem;
      color: #999;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    /* 返回链接 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 20px;
      transition: color 0.3s;
    }
    
    .back-link:hover {
      color: #764ba2;
    }
    
    /* 加载状态 */
    .loading-state {
      text-align: center;
      padding: 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- 全局导航 -->
  <nav class="global-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">🍽️ 智能配餐</a>
      <ul class="nav-links" id="navLinks">
        <!-- 动态生成 -->
      </ul>
      <button class="btn-login" data-login-text="登录/注册" style="padding:8px 16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:0.85rem;cursor:pointer;font-weight:600">登录/注册</button>
      <button class="nav-toggle" id="navToggle">☰</button>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="stats-page">
    <a href="index.html" class="back-link">← 返回首页</a>
    
    <!-- 头部 -->
    <div class="stats-hero">
      <h1>📊 数据统计中心</h1>
      <p>智能菜谱网站矩阵 · 实时数据概览</p>
      <div class="stats-time" id="updateTime">数据更新时间：加载中...</div>
    </div>
    
    <!-- 总览统计 -->
    <div class="stats-overview" id="statsOverview">
      <div class="overview-card">
        <div class="overview-icon">👁️</div>
        <div class="overview-value" id="totalViews">--</div>
        <div class="overview-label">全站总浏览量</div>
        <div class="overview-change" id="viewsChange">今日 +--</div>
      </div>
      <div class="overview-card">
        <div class="overview-icon">🍳</div>
        <div class="overview-value" id="totalMeals">--</div>
        <div class="overview-label">菜单生成总次数</div>
        <div class="overview-change" id="mealsChange">今日 +--</div>
      </div>
      <div class="overview-card">
        <div class="overview-icon">👥</div>
        <div class="overview-value" id="totalUsers">--</div>
        <div class="overview-label">注册用户数</div>
      </div>
      <div class="overview-card">
        <div class="overview-icon">🌐</div>
        <div class="overview-value">7</div>
        <div class="overview-label">子站数量</div>
      </div>
    </div>
    
    <!-- 排行榜 -->
    <div class="rankings-section">
      <!-- 热门菜品排行 -->
      <div class="ranking-card">
        <div class="ranking-header">
          <h2>🔥 热门菜品 TOP 10</h2>
        </div>
        <ul class="ranking-list" id="recipesRanking">
          <li class="loading-state">加载中...</li>
        </ul>
      </div>
      
      <!-- 站点活跃排行 -->
      <div class="ranking-card">
        <div class="ranking-header">
          <h2>📈 站点活跃排行</h2>
        </div>
        <ul class="ranking-list" id="sitesRanking">
          <li class="loading-state">加载中...</li>
        </ul>
      </div>
    </div>
    
    <!-- 各站点数据对比 -->
    <div class="sites-comparison">
      <h2>🌐 各站点数据对比</h2>
      <div class="sites-grid" id="sitesGrid">
        <div class="loading-state">加载中...</div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>🍽️ 智能菜谱网站矩阵 - 让每一餐都完美</p>
      <p class="copyright">© 2026 Recipe Matrix. All rights reserved.</p>
    </div>
  </footer>

  <!-- 脚本 -->
  <script src="global.js"></script>
  <script src="member.js"></script>
  <script src="site-nav.js"></script>
  <script>
    // 仪表盘数据加载
    const StatsPage = {
      API_BASE: 'https://recipe-stats-worker.jing2595832.workers.dev',
      
      async fetchWithTimeout(url, timeout = 5000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
          const res = await fetch(url, { signal: controller.signal });
          clearTimeout(timeoutId);
          return res;
        } catch (e) {
          clearTimeout(timeoutId);
          throw e;
        }
      },
      
      formatNum(n) {
        if (!n) return '0';
        if (n >= 10000) return (n / 10000).toFixed(1) + '万';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return String(n);
      },
      
      async init() {
        // 更新时间
        document.getElementById('updateTime').textContent = 
          '数据更新时间：' + new Date().toLocaleString('zh-CN');
        
        // 并行加载数据
        await Promise.all([
          this.loadOverview(),
          this.loadRecipesRanking(),
          this.loadSitesRanking()
        ]);
      },
      
      async loadOverview() {
        try {
          const res = await this.fetchWithTimeout(`${this.API_BASE}/api/dashboard?site_id=main`);
          const data = await res.json();
          
          document.getElementById('totalViews').textContent = this.formatNum(data.total_views);
          document.getElementById('totalMeals').textContent = this.formatNum(data.total_meals);
          document.getElementById('totalUsers').textContent = this.formatNum(data.user_count);
          document.getElementById('viewsChange').textContent = '今日 +' + this.formatNum(data.today_views);
          document.getElementById('mealsChange').textContent = '今日 +' + this.formatNum(data.today_meals);
        } catch (e) {
          document.getElementById('totalViews').textContent = '--';
          document.getElementById('totalMeals').textContent = '--';
        }
      },
      
      async loadRecipesRanking() {
        const list = document.getElementById('recipesRanking');
        try {
          const res = await this.fetchWithTimeout(`${this.API_BASE}/api/top-recipes?limit=10`);
          const data = await res.json();
          
          if (!data.recipes || data.recipes.length === 0) {
            list.innerHTML = '<li class="empty-state"><div class="emoji">🍳</div>暂无数据</li>';
            return;
          }
          
          list.innerHTML = data.recipes.map((r, i) => {
            const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
            const name = r.recipe_name || r.recipe_id || '未知菜品';
            return `<li class="ranking-item">
              <span class="rank-badge ${cls}">${i + 1}</span>
              <div class="rank-info">
                <div class="rank-name">${name}</div>
              </div>
              <span class="rank-value">${this.formatNum(r.total_views)} 次</span>
            </li>`;
          }).join('');
        } catch (e) {
          list.innerHTML = '<li class="empty-state">网络超时</li>';
        }
      },
      
      async loadSitesRanking() {
        const list = document.getElementById('sitesRanking');
        const grid = document.getElementById('sitesGrid');
        
        try {
          const res = await this.fetchWithTimeout(`${this.API_BASE}/api/sites`);
          const data = await res.json();
          
          if (!data.sites || data.sites.length === 0) {
            list.innerHTML = '<li class="empty-state">暂无数据</li>';
            grid.innerHTML = '<div class="empty-state">暂无数据</div>';
            return;
          }
          
          // 按浏览量排序
          const sorted = data.sites.sort((a, b) => (b.views || 0) - (a.views || 0));
          
          // 排行榜
          list.innerHTML = sorted.map((s, i) => {
            const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
            return `<li class="ranking-item ${s.id === 'main' ? 'current' : ''}">
              <span class="rank-badge ${cls}">${i + 1}</span>
              <div class="rank-info">
                <div class="rank-name">${s.emoji} ${s.name}${s.id === 'main' ? ' (当前)' : ''}</div>
              </div>
              <span class="rank-value">${this.formatNum(s.views)} 浏览</span>
            </li>`;
          }).join('');
          
          // 站点网格
          grid.innerHTML = data.sites.map(s => `
            <div class="site-stat-card ${s.id === 'main' ? 'current' : ''}">
              <div class="site-emoji">${s.emoji}</div>
              <div class="site-name">${s.name}</div>
              <div class="site-views">${this.formatNum(s.views)}</div>
              <div class="site-label">浏览量</div>
            </div>
          `).join('');
        } catch (e) {
          list.innerHTML = '<li class="empty-state">网络超时</li>';
          grid.innerHTML = '<div class="empty-state">网络超时</div>';
        }
      }
    };
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      MemberSystem.init();
      SiteNav.init('main');
      StatsPage.init();
    });
  </script>
</body>
</html>
